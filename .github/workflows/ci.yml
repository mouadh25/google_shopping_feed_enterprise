name: CI - Static checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Run pip-audit
        run: |
          pip-audit --progress bar

      - name: Run Bandit
        run: |
          bandit -r . -ll -f json -o bandit-result.json || true

      - name: Python syntax check
        run: |
          python -m py_compile $(git ls-files '*.py')

      - name: Upload Bandit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-result
          path: bandit-result.json
